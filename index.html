<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廉洁签名</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
        body{background:#e6f5ee;padding:40px 20px;}
        .box{max-width:500px;margin:0 auto;background:#fff;padding:30px;border-radius:16px;}
        h2{text-align:center;color:#2a7d54;margin-bottom:20px}
        input{width:100%;height:50px;padding:0 16px;border:2px solid #b4d9c4;border-radius:10px;font-size:16px;margin-bottom:16px;}
        button{width:100%;height:50px;background:#349464;color:white;border:none;border-radius:10px;font-size:16px}
        #tip{margin-top:16px;text-align:center;color:#349464}
    </style>
</head>
<body>
    <div class="box">
        <h2>廉洁承诺签名</h2>
        <input type="text" id="name" placeholder="请输入姓名">
        <button onclick="submit()">提交到大屏</button>
        <p id="tip"></p>
    </div>

    <script>
        function submit() {
            let name = document.getElementById("name").value.trim();
            if (!name) {
                alert("请输入姓名！");
                return;
            }

            // 提交成功一定弹窗 + 文字提示（绝对有反应）
            alert("提交成功：" + name);
            document.getElementById("tip").innerText = "✅ 提交成功：" + name;

            // 云端写入（永久稳定）
            localStorage.setItem("LAST_NAME", name);
            window.open("https://12hezi.github.io/my_page0/screen.html#" + name);
        }
    </script>
</body>
</html>
